name: Refresh Secrets

on:
  workflow_dispatch:
    inputs:
      app_env:
        description: Target environment name
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: refresh-secrets-${{ inputs.app_env }}
  cancel-in-progress: false

jobs:
  refresh:
    uses: your-github-org/laravel-deploy-kit/.github/workflows/refresh-secrets.yml@v1
    with:
      app_env: ${{ inputs.app_env }}
      manifest_path: deploy/manifest.yml
    secrets: inherit

