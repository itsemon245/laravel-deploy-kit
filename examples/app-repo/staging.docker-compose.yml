services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: fake-local-password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  web:
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  redis-data:

