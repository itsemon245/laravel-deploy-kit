---
- name: Install Docker packages on Debian hosts
  ansible.builtin.apt:
    name: "{{ ldk_docker_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == 'Debian'

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: "{{ ldk_docker_service_name }}"
    state: started
    enabled: true
  become: true

- name: Add deploy user to Docker group
  ansible.builtin.user:
    name: "{{ ldk_deploy_user }}"
    groups:
      - docker
    append: true
  become: true
  when: ldk_add_deploy_user_to_docker_group | bool

- name: Verify Docker is available
  ansible.builtin.command:
    argv:
      - docker
      - version
      - --format
      - "{{ '{{' }}.Server.Version{{ '}}' }}"
  changed_when: false
  become: true

- name: Verify Docker Compose plugin is available
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - version
  changed_when: false
  become: true

