---
- name: Initialize secret payload list
  ansible.builtin.set_fact:
    ldk_secret_source_payloads: "{{ ldk_secret_source_payloads | default([]) }}"
    ldk_infisical_domain_args: >-
      {{
        ['--domain=' ~ ldk_manifest.secrets.url]
        if (ldk_manifest.secrets.url is defined and ldk_manifest.secrets.url | length > 0)
        else []
      }}
  no_log: true

- name: Export Infisical secret sources on controller
  ansible.builtin.command:
    argv: >-
      {{
        [ldk_infisical_binary, 'export', '--format=json',
         '--projectId=' ~ item.project_id,
         '--env=' ~ item.env_slug,
         '--path=' ~ item.path]
        + ldk_infisical_domain_args
      }}
  environment:
    INFISICAL_TOKEN: "{{ infisical_token | default(lookup('ansible.builtin.env', 'INFISICAL_TOKEN'), true) }}"
    INFISICAL_DISABLE_UPDATE_CHECK: "true"
  delegate_to: localhost
  loop: "{{ ldk_manifest.secrets.sources }}"
  loop_control:
    label: "{{ item.name }}"
  register: ldk_infisical_exported_sources
  changed_when: false
  no_log: true

- name: Normalize Infisical source payloads
  ansible.builtin.set_fact:
    ldk_secret_source_payloads: >-
      {{
        ldk_secret_source_payloads + [
          {
            'name': item.item.name,
            'class': item.item.class | default('app'),
            'secrets': item.stdout | ldk_normalize_infisical_json
          }
        ]
      }}
  loop: "{{ ldk_infisical_exported_sources.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  no_log: true

- name: Validate Infisical payloads are dictionaries
  ansible.builtin.assert:
    that:
      - item.secrets is mapping
    fail_msg: "Infisical source {{ item.name }} must export key/value JSON."
  loop: "{{ ldk_secret_source_payloads }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

