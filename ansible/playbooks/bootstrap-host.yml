---
- name: Bootstrap Laravel app host
  hosts: app
  gather_facts: true
  vars:
    validate_compose_files_exist: false
    ldk_bootstrap_render_env: true
  roles:
    - role: manifest_validate
    - role: host_common
    - role: docker_engine
    - role: app_bootstrap
    - role: secrets_sops
      when:
        - ldk_bootstrap_render_env | bool
        - ldk_manifest.secrets.provider in ['sops', 'sops_age']
    - role: secrets_infisical
      when:
        - ldk_bootstrap_render_env | bool
        - ldk_manifest.secrets.provider in ['infisical', 'infisical_cloud', 'infisical_self_hosted']
    - role: secrets_merge
      when: ldk_bootstrap_render_env | bool
    - role: render_env_file
      when: ldk_bootstrap_render_env | bool
    - role: monitoring
      when: ldk_monitoring_enabled | default(false) | bool

