---
- name: Deploy Laravel app from VM-local Docker build
  hosts: app
  gather_facts: false
  serial: "{{ ldk_deploy_serial | default('100%') }}"
  vars:
    validate_compose_files_exist: false
  roles:
    - role: manifest_validate
    - role: secrets_sops
      when: ldk_manifest.secrets.provider in ['sops', 'sops_age']
    - role: secrets_infisical
      when: ldk_manifest.secrets.provider in ['infisical', 'infisical_cloud', 'infisical_self_hosted']
    - role: secrets_merge
    - role: render_env_file
    - role: repo_checkout
    - role: compose_preflight
    - role: docker_cleanup_policy
    - role: compose_one_time_services
    - role: laravel_remote_build
    - role: horizon_drain
    - role: laravel_migrate_once
    - role: compose_rollout
    - role: health_check
