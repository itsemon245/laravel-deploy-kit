---
- name: Provision Redis node as one-time infrastructure
  hosts: redis
  gather_facts: true
  vars:
    validate_compose_files_exist: false
  roles:
    - role: manifest_validate
    - role: secrets_sops
      when: ldk_manifest.secrets.provider in ['sops', 'sops_age']
    - role: secrets_infisical
      when: ldk_manifest.secrets.provider in ['infisical', 'infisical_cloud', 'infisical_self_hosted']
    - role: secrets_merge
    - role: host_common
    - role: docker_engine
    - role: redis_node

