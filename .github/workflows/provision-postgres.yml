name: Provision Postgres

on:
  workflow_call:
    inputs:
      app_env:
        required: true
        type: string
      manifest_path:
        required: false
        type: string
        default: deploy/manifest.yml
      inventory_sops_path:
        required: false
        type: string
        default: ""
      inventory_infisical_project_id:
        required: false
        type: string
        default: ""
      inventory_infisical_env:
        required: false
        type: string
        default: ""
      inventory_infisical_path:
        required: false
        type: string
        default: /deploy
      inventory_infisical_key:
        required: false
        type: string
        default: ANSIBLE_INVENTORY
      inventory_infisical_url:
        required: false
        type: string
        default: ""
      inventory_group:
        required: false
        type: string
        default: postgres
    secrets:
      LDK_SSH_PRIVATE_KEY:
        required: false
      LDK_INVENTORY:
        required: false
      LDK_KNOWN_HOSTS:
        required: false
      SOPS_AGE_KEY:
        required: false
      INFISICAL_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.app_env }}
    env:
      APP_DIR: ${{ github.workspace }}/app
      KIT_DIR: ${{ github.workspace }}/deploy-kit
      LDK_INVENTORY_PATH: /tmp/ldk-inventory.ini
      ANSIBLE_CONFIG: ${{ github.workspace }}/deploy-kit/ansible/ansible.cfg
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/deploy-kit/ansible/roles
      ANSIBLE_FILTER_PLUGINS: ${{ github.workspace }}/deploy-kit/ansible/filter_plugins
    steps:
      - uses: actions/checkout@v4
        with:
          path: app
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.action_repository }}
          ref: ${{ github.action_ref }}
          path: deploy-kit
      - name: Install tools
        run: |
          python -m pip install --user --upgrade pip
          python -m pip install --user ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ansible-galaxy install -r "$KIT_DIR/ansible/requirements.yml"
          curl -fsSL "https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64" -o "$RUNNER_TEMP/sops"
          sudo install -m 0755 "$RUNNER_TEMP/sops" /usr/local/bin/sops
          npm install --global @infisical/cli
      - name: Configure SSH and inventory
        env:
          LDK_SSH_PRIVATE_KEY: ${{ secrets.LDK_SSH_PRIVATE_KEY }}
          LDK_KNOWN_HOSTS: ${{ secrets.LDK_KNOWN_HOSTS }}
          LDK_INVENTORY: ${{ secrets.LDK_INVENTORY }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          install -m 0700 -d "$HOME/.ssh"
          if [ -n "$LDK_SSH_PRIVATE_KEY" ]; then
            printf '%s\n' "$LDK_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
            chmod 0600 "$HOME/.ssh/id_ed25519"
          fi
          if [ -n "$LDK_KNOWN_HOSTS" ]; then
            printf '%s\n' "$LDK_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            echo "ANSIBLE_SSH_COMMON_ARGS=-o StrictHostKeyChecking=yes" >> "$GITHUB_ENV"
          else
            echo "ANSIBLE_SSH_COMMON_ARGS=-o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"
          fi
          args=(
            --output "$LDK_INVENTORY_PATH"
            --github-secret-env LDK_INVENTORY
            --infisical-project-id "${{ inputs.inventory_infisical_project_id }}"
            --infisical-env "${{ inputs.inventory_infisical_env }}"
            --infisical-path "${{ inputs.inventory_infisical_path }}"
            --infisical-key "${{ inputs.inventory_infisical_key }}"
            --infisical-url "${{ inputs.inventory_infisical_url }}"
          )
          if [ -n "${{ inputs.inventory_sops_path }}" ]; then
            args+=(--sops-file "$APP_DIR/${{ inputs.inventory_sops_path }}")
          fi
          "$KIT_DIR/bin/resolve-inventory" "${args[@]}"
      - name: Provision Postgres
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          ansible-playbook \
            -i "$LDK_INVENTORY_PATH" \
            "$KIT_DIR/ansible/playbooks/provision-postgres.yml" \
            --limit "${{ inputs.inventory_group }}" \
            -e "manifest_path=$APP_DIR/${{ inputs.manifest_path }}" \
            -e "app_env=${{ inputs.app_env }}"
